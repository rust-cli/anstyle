<svg width="740px" height="182px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .bg-white { stroke: #AAAAAA; fill: #AAAAAA; user-select: none;  }
    .fg-black { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    .italic { font-style: italic; }
    .underline { text-decoration-line: underline; }
    .strikethrough { text-decoration-line: line-through; }
    .dimmed { opacity: 0.4; }
    .hidden { opacity: 0; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="bold">bold</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan class="dimmed">dim</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan class="italic">italic</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="underline">underline</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan class="bg-white">██████</tspan><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan class="fg-black">invert</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan class="hidden">hidden</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan class="strikethrough">strikethrough</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan class="underline bold italic">all three</tspan><tspan class="underline italic"> no bold</tspan><tspan class="underline"> no italic</tspan><tspan> plain</tspan>
</tspan>
    <tspan x="10px" y="172px">
</tspan>
  </text>

</svg>
