<svg width="740px" height="182px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .bg-white { stroke: #AAAAAA; fill: #AAAAAA; user-select: none;  }
    .fg-black { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    .italic { font-style: italic; }
    .underline { text-decoration-line: underline; }
    .strikethrough { text-decoration-line: line-through; }
    .dimmed { opacity: 0.4; }
    .hidden { opacity: 0; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="bold">bold normal</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan class="bold dimmed">dim normal</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan class="bold italic dimmed">italic normal</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="underline bold italic dimmed">underline normal</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan class="bg-white">█████████████</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan class="fg-black underline bold italic dimmed">invert normal</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan class="bg-white">█████████████</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan class="fg-black underline bold italic dimmed hidden">hidden normal</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan class="bg-white">████████████████████</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan class="fg-black underline strikethrough bold italic dimmed hidden">strikethrough normal</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan class="bg-white">█████████████████████████████████</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan class="fg-black underline strikethrough bold italic dimmed hidden">all three no bold no italic plain</tspan>
</tspan>
    <tspan x="10px" y="172px">
</tspan>
    <tspan x="10px" y="172px">
</tspan>
  </text>

</svg>
