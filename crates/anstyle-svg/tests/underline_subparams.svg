<svg width="740px" height="128px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .underline { text-decoration-line: underline; }
    .double-underline { text-decoration-line: underline; text-decoration-style: double; }
    .curly-underline { text-decoration-line: underline; text-decoration-style: wavy; }
    .dotted-underline { text-decoration-line: underline; text-decoration-style: dotted; }
    .dashed-underline { text-decoration-line: underline; text-decoration-style: dashed; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="underline">underline</tspan><tspan> normal</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan class="double-underline">double normal</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan class="double-underline curly-underline">curly normal</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="double-underline curly-underline dotted-underline">dotted normal</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan class="double-underline curly-underline dotted-underline dashed-underline">dashed normal</tspan>
</tspan>
    <tspan x="10px" y="118px">
</tspan>
  </text>

</svg>
