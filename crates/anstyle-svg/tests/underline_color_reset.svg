<svg width="740px" height="92px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .underline-ansi256-202 { text-decoration-line: underline; text-decoration-color: #FF5F00 }
    .underline-rgb-0080FF { text-decoration-line: underline; text-decoration-color: #0080FF }
    .underline-rgb-FF0000 { text-decoration-line: underline; text-decoration-color: #FF0000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .underline { text-decoration-line: underline; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="underline-rgb-FF0000 underline">red underline default color underline</tspan><tspan class="underline-rgb-FF0000"> normal</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan class="underline-ansi256-202 underline">orange underline default color underline</tspan><tspan class="underline-ansi256-202"> normal</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan class="underline-rgb-0080FF underline">blue underline default color underline</tspan><tspan class="underline-rgb-0080FF"> normal</tspan>
</tspan>
    <tspan x="10px" y="82px">
</tspan>
  </text>

</svg>
